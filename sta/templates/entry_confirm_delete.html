{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STA  Supprimer le log</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --noir:    #111827;
      --gris:    #6b7280;
      --bordure: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--noir);
      background: #b0b0b0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-fermer {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      font-size: 1.4rem;
      color: var(--noir);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-fermer:hover { color: #000; }

    .carte {
      background: #fff;
      border-radius: 4px;
      padding: 2.75rem 2.75rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .icone-warning {
      font-size: 2.5rem;
      margin-bottom: 1.25rem;
      display: block;
    }

    .carte h4 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: .75rem;
    }

    .carte p {
      font-size: .9rem;
      color: var(--gris);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .carte p strong {
      color: var(--noir);
      font-weight: 600;
    }

    .zone-boutons {
      display: flex;
      gap: .75rem;
    }

    .btn-annuler {
      flex: 1;
      padding: .75rem;
      border: 1.5px solid var(--noir);
      border-radius: 2px;
      background: transparent;
      color: var(--noir);
      font-size: .9rem;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .btn-annuler:hover { background: #f9fafb; color: var(--noir); }

    .btn-supprimer {
      flex: 1;
      padding: .75rem;
      border: none;
      border-radius: 2px;
      background: #ef4444;
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-supprimer:hover { opacity: .85; }
  </style>
</head>
<body>

  <a href="{% url 'dashboard' %}" class="btn-fermer" title="Annuler">&#x2715;</a>

  <div class="carte">

    <span class="icone-warning">⚠️</span>

    <h4>Supprimer ce log ?</h4>

    <p>
      « <strong>{{ object.titre }}</strong> »<br>
      Cette action est irréversible.
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="zone-boutons">
        <a href="{% url 'dashboard' %}" class="btn-annuler">Annuler</a>
        <button type="submit" class="btn-supprimer">Oui, supprimer</button>
      </div>
    </form>

  </div>

</body>
</html>
