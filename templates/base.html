<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STA — Système de Traçabilité</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0F172A; color: #F8FAFC; }
        .navbar { background-color: #1E293B !important; }
        .card { background-color: #1E293B; border: 1px solid #334155; color: #F8FAFC; }
        .btn-primary { background-color: #6366F1; border-color: #6366F1; }
        .form-control { background-color: #0F172A; border-color: #334155; color: #F8FAFC; }
        .form-control:focus { background-color: #0F172A; color: #F8FAFC; border-color: #6366F1; }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold" style="color:#6366F1">⚡ STA</span>
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary">{{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger">Déconnexion</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
