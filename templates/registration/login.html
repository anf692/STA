{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/authentification.css' %}">

</head>
<body>

  <div class="carte-auth">

    <!-- Onglets -->
    <div class="onglets">
      <a href="{% url 'register' %}" class="onglet">Inscription</a>
      <a href="{% url 'login' %}" class="onglet actif">Connexion</a>
    </div>

    <!-- Erreur identifiants -->
    {% if form.errors %}
    <div class="erreurs">
      Nom d'utilisateur ou mot de passe incorrect.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}" />

      <!-- Nom d'utilisateur -->
      <div class="groupe-champ">
        <label for="{{ form.username.id_for_label }}">Nom d'utilisateur</label>
        <input type="text"
               id="{{ form.username.id_for_label }}"
               name="{{ form.username.html_name }}"
               value="{{ form.username.value|default:'' }}"
               autocomplete="username" autofocus />
      </div>

      <!-- Mot de passe -->
      <div class="groupe-champ">
        <label for="{{ form.password.id_for_label }}">Mot de passe</label>
        <input type="password"
               id="{{ form.password.id_for_label }}"
               name="{{ form.password.html_name }}"
               autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <p class="lien-bas">
      Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire</a>
    </p>

  </div>

</body>
</html>
