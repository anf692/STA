{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4 shadow">
            <h2 class="text-center mb-4" style="color:#6366F1">⚡ STA</h2>
            <h5 class="text-center text-secondary mb-4">Créer un compte</h5>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100">Créer mon compte</button>
            </form>
            <p class="text-center mt-3 text-secondary">
                Déjà un compte ?
                <a href="{% url 'login' %}" style="color:#6366F1">Se connecter</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
