{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/authentification.css' %}">

</head>
<body>


  <div class="carte-auth">

    <!-- Onglets -->
    <div class="onglets">
      <a href="{% url 'register' %}" class="onglet actif">Inscription</a>
      <a href="{% url 'login' %}" class="onglet">Connexion</a>
    </div>

    <!-- Erreurs globales -->
    {% if form.errors %}
    <div class="erreurs">
      {% for field in form %}
        {% for error in field.errors %}{{ error }}<br>{% endfor %}
      {% endfor %}
      {% for error in form.non_field_errors %}{{ error }}<br>{% endfor %}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <!-- Nom d'utilisateur -->
      <div class="groupe-champ">
        <label for="{{ form.username.id_for_label }}">Nom d'utilisateur</label>
        <input type="text"
               id="{{ form.username.id_for_label }}"
               name="{{ form.username.html_name }}"
               value="{{ form.username.value|default:'' }}"
               autocomplete="username" autofocus />
      </div>

      <!-- Mot de passe -->
      <div class="groupe-champ">
        <label for="{{ form.password1.id_for_label }}">Mot de passe</label>
        <input type="password"
               id="{{ form.password1.id_for_label }}"
               name="{{ form.password1.html_name }}"
               autocomplete="new-password" />
      </div>

      <!-- Confirmer mot de passe -->
      <div class="groupe-champ">
        <label for="{{ form.password2.id_for_label }}">Confirmer le mot de passe</label>
        <input type="password"
               id="{{ form.password2.id_for_label }}"
               name="{{ form.password2.html_name }}"
               autocomplete="new-password" />
      </div>

      <button type="submit" class="btn-submit">S'inscrire</button>
    </form>

    <p class="lien-bas">
      Déjà un compte ? <a href="{% url 'login' %}">Se connecter</a>
    </p>

  </div>

</body>
</html>
